<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PvZ APOCALIPSIS</title>

<style>
body {
  margin:0;
  background:#1b1b1b;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* 📱 TELEFONO */
#phone {
  position: absolute;
  top: 10px;
  right: 10px;
  width: 120px;
  height: 200px;
  background: black;
  border-radius: 20px;
  border: 3px solid #333;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  box-shadow: 0 0 20px rgba(0,0,0,0.7);
}

#screen {
  width: 90%;
  height: 85%;
  background: #111;
  border-radius: 10px;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

#codeInput {
  width: 80%;
  padding: 5px;
  border-radius: 5px;
  border:none;
  text-align:center;
}

/* 🌊 OLEADA */
.wave-bar {
  text-align:center;
  padding:5px;
  background:#222;
  font-weight:bold;
}

/* 🔥 BARRA */
.level-container{
  width:100%;
  height:18px;
  background:#2b2b2b;
  border:2px solid #000;
}

.level-fill{
  height:100%;
  width:0%;
  background:linear-gradient(to right, #00ff00, #66ff66);
}

/* 💀 EFECTO */
.apocalypse {
  filter: brightness(0.6) contrast(1.4);
  animation: shake 0.2s infinite;
}

@keyframes shake {
  0% { transform: translate(0,0); }
  25% { transform: translate(2px,1px); }
  50% { transform: translate(-2px,-1px); }
  75% { transform: translate(2px,-2px); }
  100% { transform: translate(0,0); }
}

.score {
  text-align:center;
  padding:5px;
}

.top-bar {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.card {
  width:80px;
  height:80px;
  background:#444;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}
.selected { border:3px solid yellow; }

.game {
  flex:1;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#4CAF50,#2e7d32);
}

.grid {
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(5,1fr);
  height:100%;
}

.cell {
  border:1px solid rgba(0,0,0,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.plant { font-size:28px; }

.zombie {
  position:absolute;
  font-size:30px;
}

.bullet {
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
}

.ice { background:cyan; }

.sun {
  position:absolute;
  font-size:25px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 📱 TELEFONO -->
<div id="phone">
  <div id="screen">
    <input type="password" id="codeInput" placeholder="Código">
  </div>
</div>

<div class="wave-bar">
🌊 Oleada: <span id="wave">1</span>
</div>

<div class="level-container">
  <div class="level-fill" id="levelFill"></div>
</div>

<div class="score">
☀️ <span id="score">100</span> | 🧟 <span id="kills">0</span>
</div>

<div class="top-bar">
  <div class="card" data="sunflower">🌻<br>50</div>
  <div class="card" data="shooter">🌱<br>150</div>
  <div class="card" data="ice">❄️<br>175</div>
  <div class="card" data="wall">🧱<br>200</div>
  <div class="card" data="shovel">🪏<br>Pala</div>
</div>

<div class="game" id="game">
  <div class="grid" id="grid"></div>
</div>

<script>
const grid=document.getElementById("grid");
const game=document.getElementById("game");
const scoreEl=document.getElementById("score");
const killsEl=document.getElementById("kills");
const waveEl=document.getElementById("wave");
const levelFill=document.getElementById("levelFill");

let suns=100, selected=null;
let kills=0;
let wave=1;

let infiniteSun = false;

/* 📱 CODIGOS */
const codeInput = document.getElementById("codeInput");

codeInput.addEventListener("keydown", (e) => {
  if(e.key === "Enter"){

    if(codeInput.value === "1234"){
      infiniteSun = true;
      alert("☀️ SOLES INFINITOS ACTIVADOS ☀️");
    }

    if(codeInput.value === "0"){
      infiniteSun = false;
      alert("❌ SOLES INFINITOS DESACTIVADOS ❌");
    }

    codeInput.value = "";
  }
});

let zombieMode="normal";
let apocalypse=false;

const cost={sunflower:50,shooter:150,ice:175,wall:200};

/* GRID */
for(let i=0;i<45;i++){
  let c=document.createElement("div");
  c.className="cell";
  grid.appendChild(c);
}

/* SELECCIÓN */
document.querySelectorAll(".card").forEach(c=>{
  c.onclick=()=>{
    document.querySelectorAll(".card").forEach(x=>x.classList.remove("selected"));
    c.classList.add("selected");
    selected=c.getAttribute("data");
  };
});

/* PLANTAR */
document.querySelectorAll(".cell").forEach((cell,i)=>{
  cell.onclick=()=>{

    if(selected==="shovel"){
      if(cell.children.length>0) cell.innerHTML="";
      return;
    }

    if(!selected || (!infiniteSun && suns<cost[selected]) || cell.children.length>0)return;

    if(!infiniteSun){
      suns-=cost[selected];
      scoreEl.textContent=suns;
    }

    let p=document.createElement("div");
    p.className="plant";

    if(selected==="sunflower"){
      p.textContent="🌻";
      setInterval(()=>spawnSun(cell),6000);
    }

    if(selected==="shooter"){
      p.textContent="🌱";
      shoot(i,false);
    }

    if(selected==="ice"){
      p.textContent="❄️";
      shoot(i,true);
    }

    if(selected==="wall"){
      p.textContent="🧱";
    }

    cell.appendChild(p);
  };
});

/* SOLES */
setInterval(()=>{
  let s=document.createElement("div");
  s.className="sun";
  s.textContent="☀️";

  let x=Math.random()*game.clientWidth;
  let y=0;

  s.style.left=x+"px";
  s.style.top=y+"px";

  game.appendChild(s);

  let fall=setInterval(()=>{
    y+=2;
    s.style.top=y+"px";
    if(y>game.clientHeight){ s.remove(); clearInterval(fall); }
  },20);

  s.onclick=()=>{
    suns+=75;
    scoreEl.textContent=suns;
    s.remove();
    clearInterval(fall);
  };

},5000);

/* GIRASOL */
function spawnSun(cell){
  let s=document.createElement("div");
  s.className="sun";
  s.textContent="☀️";

  let r=cell.getBoundingClientRect();
  let g=game.getBoundingClientRect();

  s.style.left=(r.left-g.left+20)+"px";
  s.style.top=(r.top-g.top+20)+"px";

  game.appendChild(s);

  s.onclick=()=>{
    suns+=25;
    scoreEl.textContent=suns;
    s.remove();
  };
}

/* DISPARO */
function shoot(index,ice){
  let delay = ice ? 1800 : 1400;

  setInterval(()=>{
    let row=Math.floor(index/9);
    let has=false;

    document.querySelectorAll(".zombie").forEach(z=>{
      let zr=Math.floor(z.offsetTop/(game.clientHeight/5));
      if(zr===row) has=true;
    });

    if(!has) return;

    let b=document.createElement("div");
    b.className="bullet"+(ice?" ice":"");

    let x=0;
    let y=(game.clientHeight/5)*row+40;

    b.style.left=x+"px";
    b.style.top=y+"px";

    game.appendChild(b);

    let move=setInterval(()=>{
      x+=5;
      b.style.left=x+"px";

      document.querySelectorAll(".zombie").forEach(z=>{
        if(Math.abs(z.offsetLeft-x)<20){
          z.hp-=1;
          if(z.hp<=0){
            kills++;
            killsEl.textContent=kills;
            z.remove();
          }
          b.remove();
          clearInterval(move);
        }
      });

    },30);

  },delay);
}

/* ZOMBIES */
function spawnZombie(){
  let types=[
    {emoji:"🧟",hp:10},
    {emoji:"🧟‍♂️",hp:18},
    {emoji:"🪣",hp:30}
  ];

  let t=types[Math.floor(Math.random()*types.length)];
  let row=Math.floor(Math.random()*5);

  let z=document.createElement("div");
  z.className="zombie";
  z.textContent=t.emoji;

  z.hp=(zombieMode==="strong")? t.hp*3 : t.hp*2;

  let x=game.clientWidth-60;
  let y=(game.clientHeight/5)*row+20;

  z.style.left=x+"px";
  z.style.top=y+"px";

  game.appendChild(z);

  let move=setInterval(()=>{
    if(!z.isConnected){ clearInterval(move); return; }

    let speed = apocalypse ? 0.8 : 0.3;
    x -= speed;
    z.style.left=x+"px";

    if(x<0){
      alert("💀 PERDISTE");
      location.reload();
    }

  },30);
}

/* OLEADAS */
function startWave(){
  let time=0;
  let maxTime=15000;
  zombieMode="normal";
  apocalypse=false;
  game.classList.remove("apocalypse");

  let spawnRate = 1200;

  let interval=setInterval(()=>{
    time+=100;
    let percent=(time/maxTime)*100;
    levelFill.style.width=percent+"%";

    if(percent>=50 && !apocalypse){
      zombieMode="strong";
      apocalypse=true;
      game.classList.add("apocalypse");
      alert("💀 APOCALIPSIS INICIADO 💀");
      spawnRate = 600;
    }

    if(time>=maxTime){
      clearInterval(interval);
      wave++;
      waveEl.textContent=wave;
      levelFill.style.width="0%";
      startWave();
    }

  },100);

  setInterval(()=>spawnZombie(), spawnRate);
}

startWave();
</script>

</body>
</html>
