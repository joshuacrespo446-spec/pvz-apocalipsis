<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PvZ PRO ARREGLADO</title>

<style>
body {
  margin:0;
  background:#1b1b1b;
  color:white;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.wave-bar, .score {
  text-align:center;
  padding:5px;
  background:#222;
}

.top-bar {
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.card {
  width:90px;
  height:100px;
  background:#444;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  font-size:14px;
  text-align:center;
  position:relative;
}

.cooldown {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:18px;
}

.selected { border:3px solid yellow; }

.game {
  flex:1;
  position:relative;
  overflow:hidden;
  background:linear-gradient(#4CAF50,#2e7d32);
}

.grid {
  display:grid;
  grid-template-columns:repeat(9,1fr);
  grid-template-rows:repeat(5,1fr);
  height:100%;
}

.cell {
  border:1px solid rgba(0,0,0,0.2);
  display:flex;
  justify-content:center;
  align-items:center;
}

.plant { font-size:28px; }

.zombie {
  position:absolute;
  font-size:30px;
}

.bullet {
  position:absolute;
  width:10px;
  height:10px;
  background:yellow;
  border-radius:50%;
}

.sun {
  position:absolute;
  font-size:25px;
  cursor:pointer;
}

.rushText{
  position:absolute;
  top:40%;
  width:100%;
  text-align:center;
  font-size:40px;
  color:red;
  font-weight:bold;
  animation: flash 0.5s infinite;
}

@keyframes flash {
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}
</style>
</head>

<body>

<div class="wave-bar">🌊 Oleada: <span id="wave">1</span></div>
<div class="score">☀️ <span id="score">100</span> | 🧟 <span id="kills">0</span></div>

<div class="top-bar">
  <div class="card" data="sunflower">🌻<br>Girasol<br>50</div>
  <div class="card" data="shooter">🌱<br>Disparadora<br>150</div>
  <div class="card" data="wall">🧱<br>Muro<br>100</div>
  <div class="card" data="cherry">🍒<br>Bomba<br>200</div>
</div>

<div class="game" id="game">
  <div class="grid" id="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
const game = document.getElementById("game");
const scoreEl = document.getElementById("score");
const killsEl = document.getElementById("kills");
const waveEl = document.getElementById("wave");

let suns = 100;
let kills = 0;
let wave = 1;
let selected = null;
let zombieRush = false;

const cost = {sunflower:50, shooter:150, wall:100, cherry:200};

// COOLDOWNS
const cooldowns = {sunflower:5, shooter:7, wall:10, cherry:15};
let ready = {sunflower:true, shooter:true, wall:true, cherry:true};

// GRID
for(let i=0;i<45;i++){
  let c=document.createElement("div");
  c.className="cell";
  grid.appendChild(c);
}

// SELECCIONAR
document.querySelectorAll(".card").forEach(c=>{
  c.onclick=()=>{
    let type=c.getAttribute("data");
    if(!ready[type]) return;

    document.querySelectorAll(".card").forEach(x=>x.classList.remove("selected"));
    c.classList.add("selected");
    selected=type;
  };
});

// COOLDOWN
function startCooldown(type, card){
  ready[type] = false;
  let cd = cooldowns[type];

  let overlay = document.createElement("div");
  overlay.className="cooldown";
  overlay.textContent=cd;

  card.appendChild(overlay);

  let interval=setInterval(()=>{
    cd--;
    overlay.textContent=cd;

    if(cd<=0){
      clearInterval(interval);
      ready[type] = true;
      overlay.remove();
    }
  },1000);
}

// PLANTAR
document.querySelectorAll(".cell").forEach((cell,i)=>{
  cell.onclick=()=>{
    if(!selected || suns < cost[selected] || cell.children.length>0 || !ready[selected]) return;

    let card = document.querySelector(`.card[data="${selected}"]`);
    suns -= cost[selected];
    scoreEl.textContent = suns;

    startCooldown(selected, card);

    let p = document.createElement("div");
    p.className="plant";

    if(selected==="sunflower"){
      p.textContent="🌻";
      setInterval(()=>spawnSun(cell),5000);
    }

    if(selected==="shooter"){
      p.textContent="🌱";
      shoot(i);
    }

    if(selected==="wall"){
      p.textContent="🧱";
    }

    if(selected==="cherry"){
      p.textContent="🍒";
      setTimeout(()=>{
        document.querySelectorAll(".zombie").forEach(z=>{
          if(!z.boss){
            z.remove();
            kills++;
          }
        });
        killsEl.textContent=kills;
        p.remove();
      },500);
    }

    cell.appendChild(p);
  };
});

// SOLES DEL CIELO
setInterval(()=>{
  let s=document.createElement("div");
  s.className="sun";
  s.textContent="☀️";

  let x=Math.random()*game.clientWidth;
  let y=0;

  s.style.left=x+"px";
  s.style.top=y+"px";

  game.appendChild(s);

  let fall=setInterval(()=>{
    y+=2;
    s.style.top=y+"px";
    if(y>game.clientHeight){ s.remove(); clearInterval(fall); }
  },20);

  s.onclick=()=>{
    suns+=50;
    scoreEl.textContent=suns;
    s.remove();
    clearInterval(fall);
  };

},4000);

// SOL GIRASOL
function spawnSun(cell){
  let s=document.createElement("div");
  s.className="sun";
  s.textContent="☀️";

  let r=cell.getBoundingClientRect();
  let g=game.getBoundingClientRect();

  s.style.left=(r.left-g.left+20)+"px";
  s.style.top=(r.top-g.top+20)+"px";

  game.appendChild(s);

  s.onclick=()=>{
    suns+=25;
    scoreEl.textContent=suns;
    s.remove();
  };
}

// DISPARO
function shoot(index){
  setInterval(()=>{
    let row=Math.floor(index/9);

    let b=document.createElement("div");
    b.className="bullet";

    let x=0;
    let y=(game.clientHeight/5)*row+40;

    b.style.left=x+"px";
    b.style.top=y+"px";

    game.appendChild(b);

    let move=setInterval(()=>{
      x+=5;
      b.style.left=x+"px";

      document.querySelectorAll(".zombie").forEach(z=>{
        if(Math.abs(z.offsetLeft-x)<20){
          z.hp--;
          if(z.hp<=0){
            kills++;
            killsEl.textContent=kills;
            z.remove();
          }
          b.remove();
          clearInterval(move);
        }
      });

    },30);

  },1500);
}

// ZOMBIES
function spawnZombie(){
  let z=document.createElement("div");
  z.className="zombie";
  z.textContent="🧟";

  z.hp = zombieRush ? 25 : 10 + wave*2;

  let row=Math.floor(Math.random()*5);
  let x=game.clientWidth-60;
  let y=(game.clientHeight/5)*row+20;

  z.style.left=x+"px";
  z.style.top=y+"px";

  game.appendChild(z);

  let move=setInterval(()=>{
    if(!z.isConnected){ clearInterval(move); return; }

    let speed = zombieRush ? 1 : 0.3 + wave*0.05;
    x -= speed;
    z.style.left=x+"px";

    if(x<0){
      alert("💀 PERDISTE");
      location.reload();
    }

  },30);
}

// HORA ZOMBIE
function zombieHour(){
  zombieRush = true;
  game.style.filter = "brightness(0.4)";

  let msg = document.createElement("div");
  msg.className="rushText";
  msg.textContent="💀 HORA ZOMBIE 💀";
  game.appendChild(msg);

  setTimeout(()=>{
    zombieRush = false;
    game.style.filter = "none";
    msg.remove();
  },8000);
}

setInterval(()=>zombieHour(),30000);

// SPAWN ZOMBIES
setInterval(()=>spawnZombie(),2000);

// OLEADAS
setInterval(()=>{
  wave++;
  waveEl.textContent=wave;
},15000);

</script>

</body>
</html>
